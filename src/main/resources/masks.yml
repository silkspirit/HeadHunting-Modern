# Display settings for masks
display:
  # Level colors
  level-colors:
    1: "&7"
    2: "&a"
    3: "&b"
    4: "&d"
    5: "&6"
  
  # Level symbols
  level-symbols:
    1: "❶"
    2: "❷"
    3: "❸"
    4: "❹"
    5: "❺"
  
  # Divine mask prefix
  divine-prefix: "&5⚜ "
  divine-suffix: " &5⚜"
  
  # Max level indicator
  max-indicator: " &e&lMAX"
  
  # Lore format
  lore:
    header: "&8━━━━━━━━━━━━━━━━━"
    ability-unlocked: "&a✔ &7{description}"
    ability-locked: "&8✖ &8{description}"
    footer: "&8━━━━━━━━━━━━━━━━━"
    divine-tag: "&5✦ DIVINE MASK ✦"
    equip-hint: "&8Right-click to equip"
