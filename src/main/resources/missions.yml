# ============================================
# HeadHunting - Divine Missions Configuration
# ============================================
# Complete missions to unlock Divine Masks!
# Each divine mask requires completing its associated mission.
# Ordered from EASIEST to HARDEST

# ============================================
# MISSION REQUIREMENT TYPES
# ============================================
# KILL_MOBS           - Kill any mobs
# KILL_SPECIFIC_MOB   - Kill specific mob type (use target: MOB_TYPE)
# KILL_PLAYERS        - Kill players in PvP
# KILL_DARKZONE_MOBS  - Kill mobs in Darkzone region
# FISH_CATCHES        - Catch fish in warzone
# BREAK_SPAWNERS      - Break spawners
# DEPOSIT_HEADS       - Deposit heads into cauldron
# DEPOSIT_SPECIFIC_HEAD - Deposit specific head type
# REACH_LEVEL         - Reach HeadHunting level
# OWN_MASK            - Own a specific mask (target: mask_id)
# OWN_MASK_LEVEL      - Own mask at level (target: mask_id, amount: level)
# OWN_MASK_COUNT      - Own X different masks
# CONSUME_HEADS       - Consume heads for XP
# EARN_MONEY          - Earn money from selling heads
# ============================================

# ============================================
# ICON OPTIONS
# ============================================
# icon-material: Material name (e.g., DIAMOND_SWORD)
# icon-data: Data value (for colored items, fish types, etc.)
# icon-skull: Base64 skull texture (for custom heads)
# icon-glow: true/false - Add enchant glow
# ============================================

# ============================================
# DARKZONE SETTINGS
# ============================================
darkzone:
  detection: factions
  factions-tag: "darkzone"
  worldguard-region: "darkzone"
  world-name: "darkzone"

