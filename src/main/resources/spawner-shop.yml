# ============================================================
# Spawner Shop Configuration
# ============================================================
# Each entry in 'spawners' defines one spawner available
# for purchase in the /spawnershop GUI.
#
# Fields:
#   mob-type      - EntityType name (must match spawner-stacking)
#   display-name  - Name shown on the GUI item
#   price         - Cost in economy currency
#   required-level - HeadHunting level required to purchase
#   slot          - GUI slot (0-53). Use -1 to auto-assign.
# ============================================================

gui-title: "&5&l✦ Spawner Shop ✦"
gui-size: 54

# Transaction lock duration after purchase (in ticks, 20 ticks = 1 second).
# Default is 1 tick (~50 ms) — just enough to prevent double-click duplication.
# The GUI closes on purchase, so the player can't click again mid-transaction.
purchase-cooldown-ticks: 1

spawners:
