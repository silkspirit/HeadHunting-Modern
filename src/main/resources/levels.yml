# Level Configuration
# HARDCORE GRIND - Vanilla SMP progression

# XP per head: Basic ~15-28, Advanced ~35-65, Extreme ~75-160, Master ~130-200, Divine ~250+
# 1 inventory = 36 heads (heads don't stack)
# Early levels: ~1 inventory to rank up
# Late levels: ~30+ inventories to rank up

levels:
