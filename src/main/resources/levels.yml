  # STARTER TIER (Levels 1-3)
  # 1-2 inventories each
  # ============================================

  1:
    xp-required: 0
    money-cost: 0
    mob-type: PIG
    rewards: []

  2:
    # ~1 inventory of pig heads (36 * 15 = 540)
    xp-required: 500
    money-cost: 25000
    mob-type: SHEEP
    rewards:
      - "msg {player} &b&lLEVEL UP! &7You unlocked &eSheep &7heads!"

