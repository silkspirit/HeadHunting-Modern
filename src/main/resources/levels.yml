# Level Configuration
# HARDCORE GRIND - 1-2+ hours per level

# XP per head: Basic ~15-20, Advanced ~30-50, Extreme ~75-150
# 1 inventory = 36 heads (heads don't stack)
# Early levels: ~1 inventory to rank up
# Late levels: ~30 inventories to rank up

