# ============================================
# HeadHunting - Daily Missions Configuration
# ============================================
# Daily missions refresh every day at midnight!
# Challenging but completable in 1-2 hours of grinding.

settings:
  # How many random missions are active each day
  missions-per-day: 4
  
  # Timezone for daily reset (default: UTC)
  timezone: "UTC"

# ============================================
# MISSION TYPES
# ============================================
# KILL_MOBS           - Kill any mobs
# KILL_SPECIFIC_MOB   - Kill specific mob (set target: MOB_TYPE)
# KILL_PLAYERS        - Kill players in PvP
# KILL_ARMORED_PLAYERS - Kill players wearing armor
# DEPOSIT_HEADS       - Deposit heads into cauldron
# CONSUME_HEADS       - Consume heads for XP
# FISH_CATCHES        - Catch fish in warzone
# HARVEST_CROPS       - Harvest crops (set target: SUGAR_CANE, WHEAT, etc.)
# ============================================

missions:

  # ============================================
  # HEAD COLLECTION MISSIONS
  # ============================================
  
  skull_collector:
    display-name: "&e&lSkull Collector"
    description: "&7Deposit 50 heads into the cauldron"
    type: DEPOSIT_HEADS
    required: 50
    icon: PLAYER_HEAD
    icon-data: 2
    rewards:
      - "eco give {player} 3000"
      - "hh giveessence {player} 25"
      - "msg {player} &6+$3,000 &7and &d25 Essence &7for your skulls!"
  
  head_hoarder:
    display-name: "&6&lHead Hoarder"
    description: "&7Deposit 100 heads into the cauldron"
