# ============================================
# HeadHunting - Daily Missions Configuration
# ============================================
# Daily missions refresh every day at midnight!
# All missions use vanilla SMP mechanics - no mods required!
# Challenging but completable in 1-2 hours of play.

settings:
  # How many random missions are active each day
  missions-per-day: 4

  # Timezone for daily reset (default: UTC)
  timezone: "UTC"

# ============================================
# MISSION TYPES
# ============================================
# KILL_MOBS           - Kill any mobs
# KILL_SPECIFIC_MOB   - Kill specific mob (set target: MOB_TYPE)
# KILL_PLAYERS        - Kill players in PvP
# DEPOSIT_HEADS       - Deposit heads into cauldron
# CONSUME_HEADS       - Consume heads for XP
# FISH_CATCHES        - Catch fish (anywhere)
# MINE_BLOCKS         - Mine any blocks
# MINE_SPECIFIC_BLOCK - Mine specific block (set target: MATERIAL)
# HARVEST_CROPS       - Harvest crops (set target: WHEAT, SUGAR_CANE, etc.)
# BREED_ANIMALS       - Breed animals
# ENCHANT_ITEMS       - Enchant items
# BREW_POTIONS        - Brew potions
# TRADE_VILLAGERS     - Trade with villagers
# TAME_ANIMALS        - Tame animals
# SMELT_ITEMS         - Smelt items in furnace
# PLACE_BLOCKS        - Place blocks
# EAT_FOOD            - Eat food items
# ============================================

missions:

  # ============================================
